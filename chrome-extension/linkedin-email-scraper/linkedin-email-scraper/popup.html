<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkedIn Email Scraper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #00c2ff;
      --accent2: #7b61ff;
      --green: #00ff88;
      --red: #ff4466;
      --text: #e8e8f0;
      --muted: #6b6b8a;
    }

    body {
      width: 340px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0d1117 0%, #13131a 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 18px 14px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(0,194,255,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .title {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-left: 38px;
    }

    /* ── Status badge ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 7px;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.active {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-label {
      display: flex;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .status-label.active { color: var(--green); }

    .counter {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .counter-label {
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      line-height: 1.2;
    }

    /* ── Controls ── */
    .controls {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .speed-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .speed-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .speed-options {
      display: flex;
      gap: 4px;
    }

    .speed-btn {
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
    }

    .speed-btn.active, .speed-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,194,255,0.08);
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
    }

    .btn-start:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-stop {
      background: rgba(255,68,102,0.12);
      color: var(--red);
      border: 1px solid rgba(255,68,102,0.3);
    }

    .btn-stop:hover { background: rgba(255,68,102,0.2); }
    .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Warning ── */
    .warning {
      margin: 0 18px;
      padding: 8px 12px;
      background: rgba(255, 180, 0, 0.07);
      border: 1px solid rgba(255, 180, 0, 0.2);
      border-radius: 6px;
      font-size: 11px;
      color: #ffb400;
      display: none;
    }

    .warning.show { display: block; }

    /* ── Email list ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px 6px;
    }

    .list-title {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-export {
      padding: 4px 12px;
      border-radius: 5px;
      border: 1px solid rgba(0,255,136,0.3);
      background: rgba(0,255,136,0.07);
      color: var(--green);
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .btn-export:hover { background: rgba(0,255,136,0.15); }
    .btn-export:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-clear {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-clear:hover { color: var(--red); border-color: rgba(255,68,102,0.3); }

    .email-list {
      max-height: 180px;
      overflow-y: auto;
      padding: 0 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .email-list::-webkit-scrollbar { width: 3px; }
    .email-list::-webkit-scrollbar-track { background: transparent; }
    .email-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .email-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .email-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .email-text {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .email-copy {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .email-copy:hover { color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      line-height: 1.8;
    }

    .not-linkedin {
      padding: 40px 24px;
      text-align: center;
    }

    .not-linkedin .icon { font-size: 32px; margin-bottom: 12px; }
    .not-linkedin p { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .not-linkedin strong { color: var(--text); display: block; margin-bottom: 6px; font-size: 13px; }

    .action-row {
      display: flex;
      gap: 6px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">✉</div>
      <span class="title">EMAIL SCRAPER</span>
    </div>
    <div class="subtitle">LinkedIn · Auto-scroll mode</div>
  </div>

  <!-- Not on LinkedIn -->
  <div id="notLinkedin" class="not-linkedin" style="display:none">
    <div class="icon">🔒</div>
    <strong>Not on LinkedIn</strong>
    <p>Navigate to a LinkedIn search page to start scraping emails.</p>
  </div>

  <!-- Main UI -->
  <div id="mainUI">
    <div class="status-bar">
      <div class="status-label" id="statusLabel">
        <div class="status-dot" id="statusDot"></div>
        IDLE
      </div>
      <div style="text-align:right">
        <div class="counter" id="counter">0</div>
        <div class="counter-label">emails found</div>
      </div>
    </div>

    <div class="controls">
      <div class="speed-row">
        <span class="speed-label">SCROLL SPEED</span>
        <div class="speed-options">
          <button class="speed-btn" data-delay="4000">SAFE</button>
          <button class="speed-btn active" data-delay="2500">NORMAL</button>
          <button class="speed-btn" data-delay="1200">FAST</button>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-start" id="btnStart">▶ START</button>
        <button class="btn btn-stop" id="btnStop" disabled>■ STOP</button>
      </div>
    </div>

    <div id="warningMsg" class="warning">
      ⚠ Fast mode may trigger LinkedIn rate limits. Use at your own risk.
    </div>

    <div class="list-header">
      <span class="list-title">Collected Emails</span>
      <div class="action-row">
        <button class="btn-clear" id="btnClear">CLEAR</button>
        <button class="btn-export" id="btnExport" disabled>⬇ CSV</button>
      </div>
    </div>

    <div class="email-list" id="emailList">
      <div class="empty-state">No emails yet.<br/>Press START to begin.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
